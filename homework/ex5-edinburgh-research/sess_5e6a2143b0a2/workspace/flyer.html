<!DOCTYPE html>
<html>
<head><style>body { font-family: sans-serif; max-width: 600px; margin: 2em auto; padding: 1em; border: 1px solid #ccc; } h1 { color: #2c3e50; text-align: center; } .fact { margin: 0.5em 0; } .label { font-weight: bold; }</style></head>
<body>
    <h1 data-testid="venue_name">Haymarket Tap</h1>
    <div class="fact"><span class="label">Address:</span> <span data-testid="venue_address">12 Dalry Rd, Edinburgh EH11 2BG</span></div>
    <div class="fact"><span class="label">Date:</span> <span data-testid="date">2026-04-25</span></div>
    <div class="fact"><span class="label">Time:</span> <span data-testid="time">19:30</span></div>
    <div class="fact"><span class="label">Party Size:</span> <span data-testid="party_size">6</span></div>
    <hr><h2>Weather</h2>
    <div class="fact"><span class="label">Condition:</span> <span data-testid="condition">cloudy</span></div>
    <div class="fact"><span class="label">Temperature:</span> <span data-testid="temperature_c">12</span>°C</div>
    <hr><h2>Cost Breakdown</h2>
    <div class="fact"><span class="label">Total Cost:</span> <span data-testid="total_gbp">£556</span></div>
    <div class="fact"><span class="label">Deposit Required:</span> <span data-testid="deposit_required_gbp">£111</span></div>
</body>
</html>
